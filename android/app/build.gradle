plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

// Read version from pubspec.yaml
def flutterProjectRoot = project.projectDir.parentFile.parentFile
def pubspec = new File(flutterProjectRoot, 'pubspec.yaml').text
def versionMatch = pubspec =~ /version:\s+(\d+)\.(\d+)\.(\d+)\+(\d+)/
def versionMajor = versionMatch.find() ? versionMatch.group(1) : '1'
def versionMinor = versionMatch.find() ? versionMatch.group(2) : '0'
def versionPatch = versionMatch.find() ? versionMatch.group(3) : '0'
def versionBuild = versionMatch.find() ? versionMatch.group(4) : '1'

android {
    namespace 'com.tcc.app'
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId 'com.tcc.app'
        minSdk 24
        targetSdk 35
        versionCode versionBuild.toInteger()
        versionName "${versionMajor}.${versionMinor}.${versionPatch}"

        // Only build for arm64-v8a (the only supported architecture)
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        debug {
            // Use default Android debug keystore
            storeFile file(System.getenv('ANDROID_SDK_HOME') ?: System.getProperty('user.home') + '/.android' + '/debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            debuggable true
            jniDebuggable true
        }
        release {
            signingConfig signingConfigs.debug  // Use debug key; replace with release key for production
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            debuggable false
            jniDebuggable false
        }
    }

    // Rename APK output
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            outputFileName = "TCC.apk"
        }
    }

    // Prevent compression of binary assets (rootfs, proot)
    // This avoids double-compression and allows mmap-like access
    aaptOptions {
        noCompress 'tgz', 'tar', 'so'
    }

    // Lint configuration
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.0'
    implementation 'androidx.annotation:annotation:1.8.0'
}
