name: Build TCC APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_rootfs:
        description: 'Rebuild rootfs from scratch'
        required: false
        default: 'false'
        type: boolean

env:
  FLUTTER_VERSION: '3.32.2'
  JAVA_VERSION: '17'
  NDK_VERSION: '27.0.12077973'
  CLAUDE_VERSION: '2.1.153'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0
          accept-android-sdk-licenses: true

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}" || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup proot (from assets)
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp assets/core/proot-arm64 android/app/src/main/jniLibs/arm64-v8a/proot-arm64
          chmod 755 android/app/src/main/jniLibs/arm64-v8a/proot-arm64
          ls -lh android/app/src/main/jniLibs/arm64-v8a/proot-arm64

      - name: Create debug keystore
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          fi
          ls -lh android/app/debug.keystore

      - name: Build rootfs (Alpine aarch64 + Node.js + Claude Code)
        run: |
          ROOTFS_DIR=$(pwd)/rootfs_build
          mkdir -p "$ROOTFS_DIR"

          # Download Alpine 3.19 aarch64 minirootfs
          echo "Downloading Alpine aarch64 minirootfs..."
          curl -sL "https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/alpine-minirootfs-3.19.1-aarch64.tar.gz" \
            -o alpine-rootfs.tar.gz

          # Extract into rootfs directory
          echo "Extracting rootfs..."
          tar xzf alpine-rootfs.tar.gz -C "$ROOTFS_DIR"

          # Setup DNS
          echo "nameserver 8.8.8.8" > "$ROOTFS_DIR/etc/resolv.conf"
          echo "nameserver 1.1.1.1" >> "$ROOTFS_DIR/etc/resolv.conf"
          echo "127.0.0.1 localhost" > "$ROOTFS_DIR/etc/hosts"
          echo "tcc" > "$ROOTFS_DIR/etc/hostname"

          # Download Node.js aarch64 binary directly (no chroot needed)
          echo "Downloading Node.js aarch64..."
          NODE_VERSION="v20.11.1"
          curl -sL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-arm64.tar.xz" \
            -o nodejs.tar.xz
          tar xJf nodejs.tar.xz
          # Copy node/npm into rootfs
          cp node-${NODE_VERSION}-linux-arm64/bin/node "$ROOTFS_DIR/usr/bin/"
          cp -r node-${NODE_VERSION}-linux-arm64/lib/node_modules "$ROOTFS_DIR/usr/lib/"
          # Create npm/npx symlinks
          ln -sf ../lib/node_modules/npm/bin/npm-cli.js "$ROOTFS_DIR/usr/bin/npm"
          ln -sf ../lib/node_modules/npm/bin/npx-cli.js "$ROOTFS_DIR/usr/bin/npx"
          # Create bin symlinks for global installs
          mkdir -p "$ROOTFS_DIR/usr/local/bin"
          ln -sf /usr/bin/node "$ROOTFS_DIR/usr/local/bin/node"
          ln -sf /usr/bin/npm "$ROOTFS_DIR/usr/local/bin/npm"
          ln -sf /usr/bin/npx "$ROOTFS_DIR/usr/local/bin/npx"

          # Create TCC directory structure
          mkdir -p "$ROOTFS_DIR/root/.tcc/versions"
          mkdir -p "$ROOTFS_DIR/root/workspace/default/.claude"

          # Install Claude Code via npm (extract tarball, no chroot needed)
          echo "Installing Claude Code v${{ env.CLAUDE_VERSION }}..."
          CLAUDE_DIR="$ROOTFS_DIR/root/.tcc/versions/v${{ env.CLAUDE_VERSION }}"
          mkdir -p "$CLAUDE_DIR/lib/node_modules"
          cd "$CLAUDE_DIR/lib/node_modules"
          npm pack "@anthropic-ai/claude-code@${{ env.CLAUDE_VERSION }}" 2>/dev/null || \
            curl -sL "https://registry.npmjs.org/@anthropic-ai/claude-code/-/claude-code-${{ env.CLAUDE_VERSION }}.tgz" -o claude-code.tgz
          tar xzf claude-code-*.tgz
          mv package claude-code
          cd -

          # Create bin directory with claude symlink
          mkdir -p "$CLAUDE_DIR/bin"
          ln -sf ../lib/node_modules/claude-code/bin/claude "$CLAUDE_DIR/bin/claude"

          # Create 'current' symlink
          cd "$ROOTFS_DIR/root/.tcc/versions"
          ln -sf "v${{ env.CLAUDE_VERSION }}" current
          cd -

          # Verify installation
          echo "Verifying rootfs..."
          ls -la "$ROOTFS_DIR/bin/sh"
          ls -la "$ROOTFS_DIR/usr/bin/node"
          ls -la "$ROOTFS_DIR/root/.tcc/versions/current/bin/"

          # Package rootfs
          echo "Packaging rootfs..."
          mkdir -p assets/core
          tar czf assets/core/rootfs.tgz -C "$ROOTFS_DIR" .

          # Cleanup
          rm -rf "$ROOTFS_DIR" alpine-rootfs.tar.gz nodejs.tar.xz node-${NODE_VERSION}-linux-arm64

          ls -lh assets/core/rootfs.tgz
          echo "Rootfs built successfully!"

      - name: Flutter pub get
        run: flutter pub get

      - name: Skip code generation (using plain Dart classes)
        run: echo "Code generation not needed - using plain Dart classes without freezed"

      - name: Build release APK
        run: |
          flutter build apk --release --target-platform=android-arm64

      - name: Verify APK
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" build/app/outputs/flutter-apk/TCC.apk
            echo "APK built successfully"
            ls -lh build/app/outputs/flutter-apk/TCC.apk
            echo "## APK Details" >> $GITHUB_STEP_SUMMARY
            echo "- Size: $(ls -lh build/app/outputs/flutter-apk/TCC.apk | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
            echo "- proot: $(ls -lh android/app/src/main/jniLibs/arm64-v8a/proot-arm64 | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
            echo "- rootfs: $(ls -lh assets/core/rootfs.tgz | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::APK not found at expected path"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TCC-release
          path: build/app/outputs/flutter-apk/TCC.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload rootfs asset
        if: hashFiles('assets/core/rootfs.tgz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-tgz
          path: assets/core/rootfs.tgz
          if-no-files-found: warn
          retention-days: 90

      - name: Create release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/TCC.apk
            assets/core/rootfs.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
