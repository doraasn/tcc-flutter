name: tcc
description: TCC - AI-Native Mobile IDE Workspace powered by Claude Code
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_markdown: ^0.7.0
  google_fonts: ^6.1.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/core/
    - assets/images/
